<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sporting Pro - Squad Scorecard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        @media print {
            .no-print { display: none !important; }
            body { background-color: white !important; padding-bottom: 0 !important; }
            .print-only { display: block !important; }
            .card-shadow { border: 1px solid #e2e8f0 !important; box-shadow: none !important; }
            table { border-collapse: collapse !important; }
            th, td { border: 1px solid #cbd5e1 !important; }
        }
        
        .hit-bg { background-color: #16a34a; color: white; }
        .miss-bg { background-color: #ef4444; color: white; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans pb-24">

    <!-- Header -->
    <header class="bg-slate-900 text-white p-4 sticky top-0 z-10 shadow-md no-print">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i data-lucide="target" class="text-orange-500"></i>
                <h1 class="text-xl font-bold tracking-tight">Sporting Pro Squad</h1>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="exportToPDF()" class="bg-slate-700 hover:bg-slate-600 px-3 py-1.5 rounded-lg text-sm font-bold flex items-center gap-2 transition-all">
                    <i data-lucide="file-down" size="16"></i> Export PDF
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 space-y-6">
        
        <!-- Squad Configuration -->
        <section class="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 no-print">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold text-slate-700 flex items-center gap-2">
                    <i data-lucide="users" size="18"></i> Squad Management (Max 6)
                </h3>
                <button id="add-shooter-btn" onclick="addShooter()" class="text-sm bg-orange-500 hover:bg-orange-600 text-white px-3 py-1 rounded-lg font-bold transition-all flex items-center gap-1">
                    <i data-lucide="plus" size="14"></i> Add Shooter
                </button>
            </div>
            <div id="shooters-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
                <!-- Dynamic Shooters -->
            </div>
        </section>

        <!-- Active Stand Controls -->
        <div id="stand-selector" class="flex items-center gap-2 overflow-x-auto pb-2 scrollbar-hide no-scrollbar px-1 no-print">
            <!-- Dynamic Stand Buttons -->
        </div>

        <!-- Scoring Table (Rotated) -->
        <section id="scoring-section" class="bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden no-print">
            <div class="bg-slate-50 p-4 border-b border-slate-200 flex justify-between items-center">
                <div class="flex flex-col">
                    <h2 id="active-stand-title" class="text-lg font-bold text-slate-800">Stand 1</h2>
                    <p id="active-stand-subtitle" class="text-xs text-slate-500 font-medium">Rotation Active</p>
                </div>
                <div class="flex items-center gap-3">
                    <div class="flex bg-slate-200 rounded-lg p-1 items-center">
                        <button onclick="updateTargetCount(-1)" class="p-1 text-slate-600 hover:bg-slate-300 rounded"><i data-lucide="minus" size="16"></i></button>
                        <span id="active-stand-targets" class="px-2 font-bold text-slate-700 min-w-[2ch] text-center">8</span>
                        <button onclick="updateTargetCount(1)" class="p-1 text-slate-600 hover:bg-slate-300 rounded"><i data-lucide="plus" size="16"></i></button>
                    </div>
                    <button onclick="removeActiveStand()" class="p-2 text-red-400 hover:text-red-600 transition-colors"><i data-lucide="trash-2" size="20"></i></button>
                </div>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 border-b border-slate-100">
                        <tr>
                            <th class="px-4 py-3 text-xs font-bold text-slate-400 uppercase">Shooter (Order)</th>
                            <th class="px-4 py-3 text-xs font-bold text-slate-400 uppercase">Targets</th>
                            <th class="px-4 py-3 text-xs font-bold text-slate-400 uppercase text-right">Score</th>
                        </tr>
                    </thead>
                    <tbody id="scoring-body">
                        <!-- Dynamic Rotated Scoring Rows -->
                    </tbody>
                </table>
            </div>

            <div class="bg-slate-50 p-4 flex gap-3 border-t border-slate-100">
                <button onclick="navStand(-1)" id="prev-btn" class="flex-1 flex items-center justify-center gap-2 bg-white border border-slate-200 py-3 rounded-xl font-bold text-slate-600 disabled:opacity-30 transition-all">
                    <i data-lucide="chevron-left" size="20"></i> Previous
                </button>
                <button onclick="navStand(1)" id="next-btn" class="flex-1 flex items-center justify-center gap-2 bg-slate-900 text-white py-3 rounded-xl font-bold disabled:opacity-30 transition-all">
                    Next Stand <i data-lucide="chevron-right" size="20"></i>
                </button>
            </div>
        </section>

        <!-- Final Scorecard Summary -->
        <section class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden card-shadow">
            <div class="p-4 bg-slate-50 border-b border-slate-200 font-bold text-slate-700 flex justify-between items-center no-print">
                <span>Squad Master Scorecard</span>
                <button onclick="resetAll()" class="text-xs text-red-500 flex items-center gap-1 hover:underline">
                   <i data-lucide="rotate-ccw" size="14"></i> Reset All
                </button>
            </div>
            
            <div class="p-6 hidden print-only">
                <h1 class="text-2xl font-bold text-center mb-2">English Sporting Scorecard</h1>
                <p id="print-date" class="text-center text-slate-500 mb-6"></p>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm" id="full-scorecard">
                    <thead>
                        <tr class="bg-slate-100 text-slate-600 font-bold" id="summary-header">
                            <th class="px-4 py-3 border-b">Stand</th>
                            <!-- Dynamic Shooter Headers -->
                        </tr>
                    </thead>
                    <tbody id="summary-body">
                        <!-- Dynamic Summary Rows -->
                    </tbody>
                    <tfoot id="summary-footer">
                        <!-- Dynamic Totals -->
                    </tfoot>
                </table>
            </div>
        </section>
    </main>

    <script>
        // --- State Management ---
        let state = {
            shooters: [
                { id: Date.now(), name: "Shooter 1" }
            ],
            stands: [
                { id: 1, targets: 8 }
            ],
            // hits structure: { shooterId: { standId: [true, false, null...] } }
            hits: {}, 
            activeStandIndex: 0
        };

        // Initialize 12 stands
        for(let i=2; i<=12; i++) {
            state.stands.push({ id: i, targets: 8 });
        }

        function init() {
            render();
        }

        // --- Logic ---
        function addShooter() {
            if (state.shooters.length >= 6) return;
            const id = Date.now();
            state.shooters.push({ id, name: `Shooter ${state.shooters.length + 1}` });
            render();
        }

        function removeShooter(id) {
            if (state.shooters.length <= 1) return;
            state.shooters = state.shooters.filter(s => s.id !== id);
            delete state.hits[id];
            render();
        }

        function updateShooterName(id, name) {
            const s = state.shooters.find(x => x.id === id);
            if (s) s.name = name;
        }

        function toggleHit(shooterId, standId, targetIdx, value) {
            if (!state.hits[shooterId]) state.hits[shooterId] = {};
            if (!state.hits[shooterId][standId]) {
                const targets = state.stands.find(s => s.id === standId).targets;
                state.hits[shooterId][standId] = Array(targets).fill(null);
            }
            
            const current = state.hits[shooterId][standId][targetIdx];
            state.hits[shooterId][standId][targetIdx] = (current === value) ? null : value;
            render();
        }

        function addStand() {
            const newId = state.stands.length > 0 ? Math.max(...state.stands.map(s => s.id)) + 1 : 1;
            state.stands.push({ id: newId, targets: 8 });
            state.activeStandIndex = state.stands.length - 1;
            render();
        }

        function updateTargetCount(delta) {
            const stand = state.stands[state.activeStandIndex];
            stand.targets = Math.max(1, stand.targets + delta);
            
            // Clean up existing scores if target count reduced
            state.shooters.forEach(s => {
                if (state.hits[s.id] && state.hits[s.id][stand.id]) {
                    state.hits[s.id][stand.id] = state.hits[s.id][stand.id].slice(0, stand.targets);
                }
            });
            render();
        }

        function navStand(dir) {
            state.activeStandIndex = Math.max(0, Math.min(state.stands.length - 1, state.activeStandIndex + dir));
            render();
        }

        function resetAll() {
            if (confirm("Wipe all data and start fresh?")) {
                state.hits = {};
                render();
            }
        }

        function exportToPDF() {
            document.getElementById('print-date').innerText = "Date: " + new Date().toLocaleDateString();
            window.print();
        }

        // --- Rendering ---
        function render() {
            const activeStand = state.stands[state.activeStandIndex];
            
            // 1. Shooter Config List
            const list = document.getElementById('shooters-list');
            list.innerHTML = '';
            state.shooters.forEach((s, idx) => {
                const div = document.createElement('div');
                div.className = "flex items-center gap-2 bg-slate-50 p-2 rounded-xl border border-slate-100";
                div.innerHTML = `
                    <span class="text-xs font-bold text-slate-400 w-4">${idx + 1}</span>
                    <input type="text" value="${s.name}" onchange="updateShooterName(${s.id}, this.value)" 
                        class="flex-1 bg-transparent border-none focus:ring-0 font-bold text-sm">
                    <button onclick="removeShooter(${s.id})" class="text-slate-300 hover:text-red-500">
                        <i data-lucide="x" size="16"></i>
                    </button>
                `;
                list.appendChild(div);
            });
            document.getElementById('add-shooter-btn').disabled = state.shooters.length >= 6;

            // 2. Stand Selector
            const selector = document.getElementById('stand-selector');
            selector.innerHTML = '';
            state.stands.forEach((s, idx) => {
                const btn = document.createElement('button');
                const active = state.activeStandIndex === idx;
                btn.className = `flex-shrink-0 w-10 h-10 rounded-lg font-bold text-sm border-2 transition-all ${
                    active ? 'bg-orange-500 border-orange-500 text-white scale-110 shadow-lg' : 'bg-white border-slate-200 text-slate-500'
                }`;
                btn.innerText = s.id;
                btn.onclick = () => { state.activeStandIndex = idx; render(); };
                selector.appendChild(btn);
            });
            const addS = document.createElement('button');
            addS.className = "flex-shrink-0 w-10 h-10 rounded-lg border-2 border-dashed border-slate-300 text-slate-300 flex items-center justify-center";
            addS.innerHTML = '<i data-lucide="plus" size="18"></i>';
            addS.onclick = addStand;
            selector.appendChild(addS);

            // 3. Active Scoring Table with ROTATION
            // Rotation Logic: Stand 1 (Index 0) starts with Shooter 0. Stand 2 (Index 1) starts with Shooter 1.
            const n = state.shooters.length;
            const rotationOffset = state.activeStandIndex % n;
            const rotatedShooters = [];
            for (let i = 0; i < n; i++) {
                rotatedShooters.push(state.shooters[(i + rotationOffset) % n]);
            }

            document.getElementById('active-stand-title').innerText = `Stand ${activeStand.id}`;
            document.getElementById('active-stand-targets').innerText = activeStand.targets;
            document.getElementById('prev-btn').disabled = state.activeStandIndex === 0;
            document.getElementById('next-btn').disabled = state.activeStandIndex === state.stands.length -1;

            const scoringBody = document.getElementById('scoring-body');
            scoringBody.innerHTML = '';
            rotatedShooters.forEach((s, displayOrder) => {
                const sScores = (state.hits[s.id] && state.hits[s.id][activeStand.id]) ? state.hits[s.id][activeStand.id] : Array(activeStand.targets).fill(null);
                const hitsCount = sScores.filter(h => h === true).length;
                
                const tr = document.createElement('tr');
                tr.className = "border-b border-slate-50";
                
                let cellsHtml = '';
                for(let i=0; i < activeStand.targets; i++) {
                    const status = sScores[i];
                    cellsHtml += `
                        <button onclick="toggleHit(${s.id}, ${activeStand.id}, ${i}, true)" 
                            class="w-8 h-8 rounded font-bold text-xs border ${status === true ? 'hit-bg' : 'bg-slate-50 text-slate-300'}">H</button>
                        <button onclick="toggleHit(${s.id}, ${activeStand.id}, ${i}, false)" 
                            class="w-8 h-8 rounded font-bold text-xs border ${status === false ? 'miss-bg' : 'bg-slate-50 text-slate-300'}">M</button>
                    `;
                }

                tr.innerHTML = `
                    <td class="px-4 py-4">
                        <div class="font-bold text-slate-800">${s.name}</div>
                        <div class="text-[10px] text-slate-400 font-bold uppercase">Order: ${displayOrder + 1}</div>
                    </td>
                    <td class="px-4 py-4">
                        <div class="flex flex-wrap gap-1 max-w-[280px]">
                            ${cellsHtml}
                        </div>
                    </td>
                    <td class="px-4 py-4 text-right">
                        <div class="font-black text-lg">${hitsCount}<span class="text-slate-300 text-xs font-normal">/${activeStand.targets}</span></div>
                    </td>
                `;
                scoringBody.appendChild(tr);
            });

            // 4. Summary Table
            const summaryHeader = document.getElementById('summary-header');
            summaryHeader.innerHTML = '<th class="px-4 py-3 border-b">Stand</th>';
            state.shooters.forEach(s => {
                summaryHeader.innerHTML += `<th class="px-4 py-3 border-b">${s.name}</th>`;
            });

            const summaryBody = document.getElementById('summary-body');
            summaryBody.innerHTML = '';
            state.stands.forEach((stand, idx) => {
                const tr = document.createElement('tr');
                tr.className = idx === state.activeStandIndex ? "bg-orange-50/50" : "border-b border-slate-50";
                let rowHtml = `<td class="px-4 py-3 font-bold text-slate-500">Stand ${stand.id} <span class="text-[10px] font-normal">(${stand.targets})</span></td>`;
                
                state.shooters.forEach(s => {
                    const hits = (state.hits[s.id] && state.hits[s.id][stand.id]) ? state.hits[s.id][stand.id].filter(h => h === true).length : 0;
                    rowHtml += `<td class="px-4 py-3 font-mono font-bold">${hits}</td>`;
                });
                tr.innerHTML = rowHtml;
                summaryBody.appendChild(tr);
            });

            const summaryFooter = document.getElementById('summary-footer');
            let footHtml = `<tr class="bg-slate-900 text-white font-bold"><td class="px-4 py-4">TOTAL</td>`;
            state.shooters.forEach(s => {
                let grandTotal = 0;
                let maxPossible = 0;
                state.stands.forEach(stand => {
                    maxPossible += stand.targets;
                    if (state.hits[s.id] && state.hits[s.id][stand.id]) {
                        grandTotal += state.hits[s.id][stand.id].filter(h => h === true).length;
                    }
                });
                footHtml += `<td class="px-4 py-4">${grandTotal}<span class="text-slate-500 font-normal text-xs">/${maxPossible}</span></td>`;
            });
            footHtml += '</tr>';
            summaryFooter.innerHTML = footHtml;

            lucide.createIcons();
        }

        window.onload = init;
    </script>
</body>
</html>
