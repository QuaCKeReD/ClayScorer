<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CPSA Sporting - Sarge Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        input, select, textarea { font-size: 16px !important; }

        @media print {
            .no-print { display: none !important; }
            body { 
                background-color: white !important; padding: 0 !important; margin: 5mm !important; 
                font-family: "Courier New", Courier, monospace; color: black !important;
            }
            .print-only { display: block !important; }
            table { width: 100% !important; border-collapse: collapse !important; border: 1.5pt solid black !important; table-layout: fixed; }
            th, td { 
                border: 0.5pt solid black !important; padding: 0 !important; color: black !important; 
                text-align: center !important; vertical-align: middle !important; overflow: hidden;
                height: 30px;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            .official-hit { font-family: serif; font-weight: 900; font-size: 11pt; line-height: 1; }
            .official-miss { font-weight: 900; font-size: 10pt; line-height: 1; }
        }

        #capture-container {
            position: absolute; left: -9999px; top: 0; width: 1200px; background: white; padding: 40px; color: black; font-family: "Courier New", Courier, monospace;
        }
        #capture-container table { width: 100%; border-collapse: collapse; border: 2pt solid black; table-layout: fixed; }
        #capture-container th, #capture-container td { border: 1pt solid black; padding: 0; text-align: center !important; vertical-align: middle !important; }
        
        .cell-center { display: flex; align-items: center; justify-content: center; height: 100%; width: 100%; text-align: center; }
        
        .hit-bg { background-color: #16a34a !important; color: white !important; border-color: #15803d !important; }
        .miss-bg { background-color: #ef4444 !important; color: white !important; border-color: #b91c1c !important; }
        
        .first-up-highlight { animation: lead-pulse 2s infinite; border: 2px solid #f97316 !important; }
        @keyframes lead-pulse { 
            0% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.4); } 
            70% { box-shadow: 0 0 0 10px rgba(249, 115, 22, 0); } 
            100% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0); } 
        }

        .pair-stack { display: flex; flex-direction: column; gap: 3px; padding: 3px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px; min-width: 62px; flex: 1; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans pb-24 overflow-x-hidden">

    <!-- Header -->
    <header class="bg-slate-900 text-white sticky top-0 z-50 shadow-md no-print w-full">
        <div class="max-w-5xl mx-auto p-3 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i data-lucide="target" class="text-orange-500 w-6 h-6"></i>
                <div>
                    <h1 class="text-base font-bold tracking-tight uppercase italic leading-none">Sporting Pro</h1>
                    <span class="text-[7px] text-green-400 font-bold uppercase flex items-center gap-1 mt-0.5"><i data-lucide="save" size="7"></i> Auto-Save</span>
                </div>
            </div>
            <div class="flex items-center gap-1.5">
                <button id="lock-btn" onclick="toggleLock()" class="bg-slate-800 p-2 rounded-lg border border-slate-700">
                    <i data-lucide="unlock" id="lock-icon" class="w-4 h-4 text-slate-400"></i>
                </button>
                <button onclick="shareAsImage()" id="share-btn" class="bg-slate-700 p-2 rounded-lg border border-slate-600">
                    <i data-lucide="share-2" class="w-4 h-4 text-white"></i>
                </button>
                <button onclick="exportToPDF()" class="bg-orange-500 px-3 py-2 rounded-lg text-[10px] font-black uppercase">PDF</button>
            </div>
        </div>
        <div class="w-full bg-slate-800 h-1"><div id="progress-bar" class="bg-orange-500 h-full transition-all duration-500 w-0"></div></div>
    </header>

    <main id="app-container" class="max-w-5xl mx-auto p-2 space-y-3 transition-opacity duration-300">

        <!-- Info Card -->
        <section class="bg-white rounded-xl shadow-sm border border-slate-200 p-3 no-print grid grid-cols-2 gap-2">
            <div class="col-span-2 sm:col-span-1 space-y-1">
                <label class="text-[9px] font-black text-slate-400 uppercase tracking-tighter">Shoot Ground</label>
                <input type="text" id="field-ground" placeholder="Ground..." class="w-full bg-slate-50 border-none rounded-lg p-2 text-xs font-bold" oninput="updateField('ground', this.value)">
            </div>
            <div class="space-y-1">
                <label class="text-[9px] font-black text-slate-400 uppercase tracking-tighter">Shoot Date</label>
                <input type="date" id="field-date" class="w-full bg-slate-50 border-none rounded-lg p-2 text-xs font-bold" onchange="updateField('date', this.value)">
            </div>
            <div class="space-y-1">
                <label class="text-[9px] font-black text-slate-400 uppercase tracking-tighter">Stand Count</label>
                <select id="field-stand-count" onchange="updateStandCount(this.value)" class="w-full bg-slate-50 border-none rounded-lg p-2 text-xs font-black"></select>
            </div>
            <div class="col-span-2 space-y-1">
                <label class="text-[9px] font-black text-slate-400 uppercase tracking-tighter">Event Name</label>
                <input type="text" id="field-event" placeholder="e.g. 100 ESP Selection" class="w-full bg-slate-50 border-none rounded-lg p-2 text-xs font-bold" oninput="updateField('event', this.value)">
            </div>
        </section>

        <!-- Squad List -->
        <section class="bg-white rounded-xl shadow-sm border border-slate-200 p-3 no-print">
            <div class="flex justify-between items-center mb-2">
                <h3 class="text-[10px] font-black uppercase tracking-widest text-slate-400">Squad Members</h3>
                <button onclick="addShooter()" class="text-[9px] bg-slate-900 text-white px-3 py-1 rounded-lg font-black uppercase">Add Shooter</button>
            </div>
            <div id="squad-list" class="grid grid-cols-1 sm:grid-cols-2 gap-2"></div>
        </section>

        <!-- Stand Nav -->
        <div id="stand-nav" class="flex items-center gap-1.5 overflow-x-auto pb-1 scrollbar-hide no-scrollbar px-1 no-print"></div>

        <!-- Scoring Interface -->
        <section class="bg-white rounded-xl shadow-lg border border-slate-200 overflow-hidden no-print">
            <div class="bg-slate-900 px-3 py-2.5 text-white flex justify-between items-center">
                <div class="flex items-baseline gap-2">
                    <h2 id="active-stand-title" class="text-lg font-black italic uppercase">Stand 1</h2>
                    <span id="active-stand-targets" class="text-[9px] text-orange-400 font-bold uppercase"></span>
                </div>
                <button id="undo-btn" onclick="undo()" class="hidden text-[9px] font-black text-white uppercase flex items-center gap-1 bg-slate-800 px-2 py-1 rounded-lg border border-slate-700">
                    <i data-lucide="rotate-ccw" size="10"></i> Undo
                </button>
            </div>
            
            <div class="bg-slate-800 p-1 flex gap-1 no-print">
                <button onclick="setBirds(4)" class="bird-btn flex-1 bg-slate-700 py-2 rounded-lg text-[9px] font-black text-slate-400" id="bird-4">2 PR</button>
                <button onclick="setBirds(6)" class="bird-btn flex-1 bg-slate-700 py-2 rounded-lg text-[9px] font-black text-slate-400" id="bird-6">3 PR</button>
                <button onclick="setBirds(8)" class="bird-btn flex-1 bg-slate-700 py-2 rounded-lg text-[9px] font-black text-slate-400" id="bird-8">4 PR</button>
                <button onclick="setBirds(10)" class="bird-btn flex-1 bg-slate-700 py-2 rounded-lg text-[9px] font-black text-slate-400" id="bird-10">5 PR</button>
            </div>

            <div id="scoring-area" class="divide-y divide-slate-100"></div>

            <div class="bg-slate-50 p-3 flex gap-3 no-print border-t border-slate-200">
                <button onclick="nav(-1)" id="nav-prev" class="flex-1 bg-white border border-slate-300 py-3 rounded-xl text-xs font-black disabled:opacity-30 tracking-widest">PREV</button>
                <button onclick="nav(1)" id="nav-next" class="flex-1 bg-slate-900 text-white py-3 rounded-xl text-xs font-black disabled:opacity-30 tracking-widest uppercase">Next Stand</button>
            </div>
        </section>

        <!-- Summary -->
        <section class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden no-print">
            <div class="p-2 bg-slate-100 border-b border-slate-200 flex justify-between items-center text-[9px] font-black uppercase text-slate-500">
                <span>Leaderboard</span>
                <div class="flex gap-4">
                    <button onclick="downloadCSV()">CSV</button>
                    <button onclick="resetAll()" class="text-red-600">Reset</button>
                </div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-[10px]" id="leaderboard">
                    <thead><tr id="lb-header" class="bg-slate-50 font-black uppercase border-b border-slate-200"></tr></thead>
                    <tbody id="lb-body"></tbody>
                    <tfoot id="lb-footer"></tfoot>
                </table>
            </div>
        </section>

        <!-- Notes -->
        <section class="bg-white rounded-xl shadow-sm border border-slate-200 p-3 no-print">
            <label class="text-[9px] font-black uppercase text-slate-400 mb-1 flex items-center gap-1"><i data-lucide="sticky-note" size="10"></i> Round Notes</label>
            <textarea id="field-notes" placeholder="Notes..." class="w-full h-20 bg-slate-50 border-none rounded-xl p-3 text-xs font-bold outline-none focus:ring-1 focus:ring-orange-500 resize-none" oninput="updateField('notes', this.value)"></textarea>
        </section>

        <!-- Capture Container -->
        <div id="capture-container">
            <div style="border-bottom: 2pt solid black; padding: 10px 0; margin-bottom: 15px; display: flex; justify-content: space-between; font-size: 14pt;">
                <div><strong>GROUND:</strong> <span id="cap-ground"></span></div>
                <div style="text-align:center; text-transform: uppercase;"><strong>Sporting Score Leaderboard</strong></div>
                <div><strong>DATE:</strong> <span id="cap-date"></span></div>
            </div>
            <table id="cap-grid"></table>
            <div style="margin-top: 30px; display: flex; justify-content: space-between; align-items: center; font-size: 11pt; font-weight: bold;">
                <span>Generated by Sarge</span>
                <div style="border-top: 1.5pt solid black; width: 300px; text-align: center; padding-top: 8px;">SCORER / SHOOTER SIGNATURE</div>
            </div>
        </div>

        <!-- Print View -->
        <div class="hidden print-only" id="print-view">
            <div class="print-header">
                <div><strong>GROUND:</strong> <span id="p-ground"></span></div>
                <div style="text-align:center; text-transform: uppercase;"><strong>Official Scorecard</strong></div>
                <div style="text-align:right"><strong>DATE:</strong> <span id="p-date"></span></div>
            </div>
            <table id="p-grid"></table>
            <div class="print-notes"><strong>NOTES:</strong> <span id="p-notes"></span></div>
            <div class="signature-section"><div class="sig-line">SIGNATURE</div></div>
            <div style="text-align: center; margin-top: 20px; font-size: 8pt; font-weight: bold; color: #666;">Generated by Sarge</div>
        </div>
    </main>

    <script>
        const KEY = 'sarge_mobile_pro_v1';
        let history = null;
        let state = {
            ground: "", date: new Date().toISOString().split('T')[0], event: "", notes: "",
            shooters: [{ id: Date.now(), name: "Shooter 1", cpsa: "", class: "U" }],
            stands: [], hits: {}, activeIdx: 0, isLocked: false
        };

        function save() { try { localStorage.setItem(KEY, JSON.stringify(state)); } catch(e) {} }
        function load() {
            const s = localStorage.getItem(KEY);
            if (s) { try { state = Object.assign({}, state, JSON.parse(s)); return true; } catch(e) {} }
            return false;
        }

        function toggleLock() { state.isLocked = !state.isLocked; render(); save(); }
        function updateField(k, v) { state[k] = v; save(); }
        
        function updateStandCount(c) {
            const count = parseInt(c);
            const current = state.stands.length;
            if (count > current) {
                for (let i = current + 1; i <= count; i++) state.stands.push({ id: i, targets: 8 });
            } else if (count < current) {
                state.stands = state.stands.slice(0, count);
                if (state.activeIdx >= count) state.activeIdx = count - 1;
            }
            render(); save();
        }

        function addShooter() {
            if (state.shooters.length >= 6) return;
            state.shooters.push({ id: Date.now(), name: `Shooter ${state.shooters.length + 1}`, cpsa: "", class: "U" });
            render(); save();
        }

        function removeShooter(id) {
            if (state.shooters.length <= 1) return;
            state.shooters = state.shooters.filter(s => s.id !== id);
            render(); save();
        }

        function toggleHit(shId, stId, idx, val) {
            if (state.isLocked) return;
            history = JSON.parse(JSON.stringify(state.hits));
            if (!state.hits[shId]) state.hits[shId] = {};
            if (!state.hits[shId][stId]) state.hits[shId][stId] = Array(state.stands.find(s=>s.id === stId).targets).fill(null);
            
            const curr = state.hits[shId][stId][idx];
            state.hits[shId][stId][idx] = (curr === val) ? null : val;
            
            if (state.hits[shId][stId][idx] !== null) {
                if (navigator.vibrate) val ? navigator.vibrate(50) : navigator.vibrate([40, 40, 40]);
            }
            render(); save();
        }

        function undo() { if (history) { state.hits = history; history = null; render(); save(); } }

        function setBirds(c) {
            if (state.isLocked) return;
            const st = state.stands[state.activeIdx];
            st.targets = c;
            state.shooters.forEach(s => {
                if (state.hits[s.id] && state.hits[s.id][st.id]) {
                    const h = state.hits[s.id][st.id];
                    state.hits[s.id][st.id] = h.length > c ? h.slice(0, c) : [...h, ...Array(c - h.length).fill(null)];
                }
            });
            render(); save();
        }

        function nav(d) { 
            if (state.isLocked) return;
            state.activeIdx = Math.max(0, Math.min(state.stands.length - 1, state.activeIdx + d)); render(); save(); 
        }

        function getUKDate(d) { return d ? new Date(d).toLocaleDateString('en-GB') : "N/A"; }

        function getShooterTotal(shId) {
            let t = 0;
            state.stands.forEach(st => {
                if (state.hits[shId]?.[st.id]) t += state.hits[shId][st.id].filter(h => h === true).length;
            });
            return t;
        }

        function resetAll() { if (confirm("Clear all data?")) { localStorage.removeItem(KEY); location.reload(); } }

        function downloadCSV() {
            let csv = "Shooter,Class,Total\n";
            state.shooters.forEach(s => { csv += `${s.name},${s.class},${getShooterTotal(s.id)}\n`; });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = 'scores.csv'; a.click();
        }

        function generateExportGrid(tid) {
            const grid = document.getElementById(tid);
            grid.innerHTML = '';
            const isShare = tid === 'cap-grid';
            
            // Layout Tuning for Image Capture centering
            const rowH = isShare ? '45px' : '30px';
            const headH = isShare ? '40px' : '25px';
            const pairH = isShare ? '25px' : '18px';

            let h = `<tr style="background:#f0f0f0"><th style="width:200px; vertical-align:middle;" rowspan="2"><div class="cell-center">NAME</div></th>`;
            state.stands.forEach(st => { 
                h += `<th colspan="${Math.ceil(st.targets/2)}" style="vertical-align:middle; height:${headH};"><div class="cell-center">ST ${st.id}</div></th>`; 
            });
            h += `<th style="width:60px; vertical-align:middle;" rowspan="2"><div class="cell-center">TOTAL</div></th></tr><tr>`;
            state.stands.forEach(st => {
                for(let p=1; p<=Math.ceil(st.targets/2); p++) 
                    h += `<th style="font-size:6pt; height:${pairH}; background:#fafafa; vertical-align:middle;"><div class="cell-center">P${p}</div></th>`;
            });
            grid.innerHTML = h + '</tr>';

            const sorted = state.shooters.map(s => ({ ...s, t: getShooterTotal(s.id) })).sort((a,b) => b.t - a.t);
            sorted.forEach(s => {
                let r1 = `<tr><td style="text-align:left; padding-left:10px; vertical-align:middle; white-space:normal;" rowspan="2"><strong>${s.name}</strong></td>`;
                let r2 = `<tr>`;
                state.stands.forEach(st => {
                    const hits = state.hits[s.id]?.[st.id] || Array(st.targets).fill(null);
                    for(let i=0; i < Math.ceil(st.targets/2)*2; i+=2) {
                        const d = (idx) => {
                            if (idx >= st.targets) return { m: '', bg: 'transparent' };
                            if (hits[idx] === true) return { m: '/', bg: '#4ade80' };
                            if (hits[idx] === false) return { m: 'O', bg: '#f87171' };
                            return { m: '', bg: 'transparent' };
                        };
                        const b1 = d(i), b2 = d(i+1);
                        r1 += `<td style="background:${b1.bg}; height:${rowH}; vertical-align:middle;"><div class="cell-center" style="font-weight:900;">${b1.m}</div></td>`;
                        r2 += `<td style="background:${b2.bg}; height:${rowH}; vertical-align:middle;"><div class="cell-center" style="font-weight:900;">${b2.m}</div></td>`;
                    }
                });
                r1 += `<td style="font-weight:bold; font-size:16pt; vertical-align:middle; background:#fafafa;" rowspan="2"><div class="cell-center">${s.t}</div></td></tr>`;
                grid.innerHTML += r1 + r2 + '</tr>';
            });
        }

        window.exportToPDF = () => {
            document.getElementById('p-ground').innerText = state.ground || "N/A";
            document.getElementById('p-date').innerText = getUKDate(state.date);
            document.getElementById('p-notes').innerText = state.notes || "None.";
            generateExportGrid('p-grid'); window.print();
        };

        window.shareAsImage = async () => {
            const container = document.getElementById('capture-container');
            document.getElementById('cap-ground').innerText = state.ground || "N/A";
            document.getElementById('cap-date').innerText = getUKDate(state.date);
            generateExportGrid('cap-grid');
            try {
                container.style.position = 'fixed'; container.style.left = '0'; container.style.top = '0'; container.style.zIndex = '-1';
                const canvas = await html2canvas(container, { scale: 3, backgroundColor: '#ffffff', useCORS: true });
                container.style.position = 'absolute'; container.style.left = '-9999px';
                canvas.toBlob(async (blob) => {
                    if (!blob) return;
                    const file = new File([blob], `scores.png`, { type: 'image/png' });
                    if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
                        await navigator.share({ files: [file], title: 'Squad Leaderboard' });
                    } else {
                        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'scores.png'; a.click();
                    }
                });
            } catch(e) {}
        };

        function render() {
            const st = state.stands[state.activeIdx];
            if (!st) return;

            document.getElementById('lock-icon').setAttribute('data-lucide', state.isLocked ? 'lock' : 'unlock');
            document.getElementById('app-container').style.opacity = state.isLocked ? "0.6" : "1";
            document.getElementById('undo-btn').style.display = history ? 'flex' : 'none';

            let sTotalShot = 0, sTotalPossible = 0;
            state.stands.forEach(s => { 
                sTotalPossible += s.targets * state.shooters.length;
                state.shooters.forEach(sh => { if(state.hits[sh.id]?.[s.id]) sTotalShot += state.hits[sh.id][s.id].filter(h=>h!==null).length; });
            });
            document.getElementById('progress-bar').style.width = sTotalPossible > 0 ? `${(sTotalShot/sTotalPossible)*100}%` : '0%';

            document.getElementById('field-ground').value = state.ground;
            document.getElementById('field-date').value = state.date;
            document.getElementById('field-event').value = state.event;
            document.getElementById('field-notes').value = state.notes;
            document.getElementById('field-stand-count').value = state.stands.length;

            const list = document.getElementById('squad-list'); list.innerHTML = '';
            state.shooters.forEach((s, i) => {
                const div = document.createElement('div');
                div.className = "bg-white p-2 rounded-xl border border-slate-200 flex justify-between items-center shadow-sm";
                div.innerHTML = `<div class="flex items-center gap-2 flex-1"><span class="text-[9px] font-black text-slate-300">${i+1}</span><input type="text" value="${s.name}" onchange="state.shooters[${i}].name=this.value;save();render();" class="flex-1 bg-transparent border-none p-0 text-[11px] font-black outline-none"></div><div class="flex items-center gap-1"><input type="text" value="${s.cpsa}" onchange="state.shooters[${i}].cpsa=this.value;save();" class="w-12 bg-slate-50 p-1 text-[9px] rounded font-bold" placeholder="CPSA"><select onchange="state.shooters[${i}].class=this.value;save();" class="text-[9px] font-black bg-slate-50 rounded p-1">${['AA','A','B','C','U'].map(c=>`<option ${s.class===c?'selected':''}>${c}</option>`)}</select><button onclick="removeShooter(${s.id})" class="text-slate-300 ml-1"><i data-lucide="x" size="14"></i></button></div>`;
                list.appendChild(div);
            });

            const navDiv = document.getElementById('stand-nav'); navDiv.innerHTML = '';
            state.stands.forEach((s, i) => {
                const btn = document.createElement('button');
                btn.className = `flex-shrink-0 w-11 h-11 rounded-xl font-black text-xs border-2 transition-all ${state.activeIdx === i ? 'bg-orange-500 border-orange-500 text-white shadow-lg' : 'bg-white border-slate-200 text-slate-500'}`;
                btn.innerText = s.id; btn.onclick = () => { if(!state.isLocked) { state.activeIdx = i; render(); save(); } };
                navDiv.appendChild(btn);
            });

            const n = state.shooters.length;
            const leadIdx = state.activeIdx % n;
            const sArea = document.getElementById('scoring-area'); sArea.innerHTML = '';
            document.getElementById('active-stand-title').innerText = `Stand ${st.id}`;
            document.getElementById('active-stand-targets').innerText = `${st.targets} Targets`;

            for(let i=0; i<n; i++) {
                const s = state.shooters[(i + leadIdx) % n];
                const hits = state.hits[s.id]?.[st.id] || Array(st.targets).fill(null);
                const count = hits.filter(h => h === true).length;
                const row = document.createElement('div');
                row.className = `p-2.5 space-y-2 ${i === 0 ? 'bg-orange-50/40 first-up-highlight' : ''} ${state.isLocked ? 'pointer-events-none' : ''}`;
                
                let gridHtml = '';
                for(let p=0; p < st.targets; p+=2) {
                    const b1 = hits[p], b2 = hits[p+1];
                    gridHtml += `<div class="pair-stack"><div class="flex gap-1"><button onclick="toggleHit(${s.id},${st.id},${p},true)" class="flex-1 h-8 rounded-md font-black text-[10px] border shadow-sm ${b1===true?'hit-bg':'bg-white border-slate-300 text-slate-400'}">H</button><button onclick="toggleHit(${s.id},${st.id},${p},false)" class="flex-1 h-8 rounded-md font-black text-[10px] border shadow-sm ${b1===false?'miss-bg':'bg-white border-slate-300 text-slate-400'}">M</button></div><div class="flex gap-1"><button onclick="toggleHit(${s.id},${st.id},${p+1},true)" class="flex-1 h-8 rounded-md font-black text-[10px] border shadow-sm ${b2===true?'hit-bg':'bg-white border-slate-300 text-slate-400'}">H</button><button onclick="toggleHit(${s.id},${st.id},${p+1},false)" class="flex-1 h-8 rounded-md font-black text-[10px] border shadow-sm ${b2===false?'miss-bg':'bg-white border-slate-300 text-slate-400'}">M</button></div></div>`;
                }
                row.innerHTML = `<div class="flex justify-between items-center px-0.5"><div class="flex items-center gap-1.5"><span class="text-xs font-black uppercase truncate max-w-[120px] tracking-tight">${s.name}</span>${i===0 ? '<span class="bg-orange-500 text-white text-[6px] px-1 rounded-full font-black">FIRST UP</span>' : ''}</div><div class="text-base font-black italic text-slate-900">${count}<span class="text-slate-300 text-[8px] not-italic ml-0.5">/${st.targets}</span></div></div><div class="flex gap-1 w-full overflow-x-hidden">${gridHtml}</div>`;
                sArea.appendChild(row);
            }

            const lbHeader = document.getElementById('lb-header'); lbHeader.innerHTML = '<th class="p-2 border-b text-left w-12 tracking-tighter">Stand</th>';
            const perf = state.shooters.map(sh => {
                let totalH = 0, totalAtt = 0;
                state.stands.forEach(stnd => {
                    if (state.hits[sh.id]?.[stnd.id]) {
                        totalH += state.hits[sh.id][stnd.id].filter(h => h === true).length;
                        totalAtt += state.hits[sh.id][stnd.id].filter(h => h !== null).length;
                    }
                });
                return { ...sh, t: totalH, att: totalAtt, isStraight: totalH === totalAtt && totalH > 0 };
            }).sort((a,b)=>b.t-a.t);

            perf.forEach(sh => lbHeader.innerHTML += `<th class="p-2 border-b border-l border-slate-200 text-center"><div class="truncate max-w-[50px] mx-auto">${sh.isStraight ? '🔥 ' : ''}${sh.name}</div></th>`);

            const lbBody = document.getElementById('lb-body'); lbBody.innerHTML = '';
            const stAvgs = state.stands.map(stand => {
                let hitC = 0, attC = 0;
                state.shooters.forEach(sh => { if(state.hits[sh.id]?.[stand.id]) { hitC += state.hits[sh.id][stand.id].filter(h=>h===true).length; attC += stand.targets; }});
                return { id: stand.id, avg: attC > 0 ? hitC/attC : 1 };
            });
            const hardId = stAvgs.sort((a,b)=>a.avg-b.avg)[0]?.id;

            state.stands.forEach((stand, idx) => {
                let row = `<td class="p-2 font-bold border-b text-slate-400 text-[8px]">ST ${stand.id} ${stand.id===hardId && sTotalShot>0?'❗':''}</td>`;
                perf.forEach(sh => {
                    const hits = state.hits[sh.id]?.[stand.id]?.filter(h=>h===true).length || 0;
                    row += `<td class="p-2 text-center border-b border-l border-slate-100 font-black">${hits}</td>`;
                });
                const tr = document.createElement('tr'); tr.className = state.activeIdx === idx ? 'bg-orange-50' : '';
                tr.innerHTML = row; lbBody.appendChild(tr);
            });

            const f = document.getElementById('lb-footer');
            let fRow = `<tr class="bg-slate-900 text-white font-black"><td class="p-2 uppercase text-[7px]">Total</td>`;
            perf.forEach(sh => fRow += `<td class="p-2 text-center text-sm border-l border-slate-700">${sh.t}</td>`);
            f.innerHTML = fRow + '</tr>';
            
            document.querySelectorAll('.bird-btn').forEach(b => b.classList.remove('bg-orange-500', 'text-white'));
            document.getElementById(`bird-${st.targets}`)?.classList.add('bg-orange-500', 'text-white');

            document.getElementById('nav-prev').disabled = state.activeIdx === 0;
            document.getElementById('nav-next').disabled = state.activeIdx === state.stands.length - 1;
            lucide.createIcons();
        }

        window.onload = () => {
            const sel = document.getElementById('field-stand-count');
            for(let i=1; i<=20; i++) { const o = document.createElement('option'); o.value=i; o.innerText=`${i} Stands`; if(i===12) o.selected=true; sel.appendChild(o); }
            if(!load()) updateStandCount(12); render();
        };
    </script>
</body>
</html>
