<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ClayScorer – English Skeet (ESK)</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="favicon.ico" sizes="32x32">
    <link rel="icon" type="image/png" href="assets/target.png">
    <link rel="apple-touch-icon" href="assets/target.png">
    <link rel="stylesheet" href="assets/scorer.css">
    <script src="assets/vendor/tailwindcss-3.4.17.js"></script>
    <script src="assets/vendor/lucide-0.468.0.min.js"></script>
    <script src="assets/vendor/html2canvas-1.4.1.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans pb-24 overflow-x-hidden">
    <div id="app-root"></div>
    <script>
        // English Skeet standard round: 24 scheduled targets plus the 25th option target.
        // Labels: H = high house single, L = low house single, H+L / L+H = simultaneous pair (bird thrown first named first).
        // OPT = first target missed is immediately reshot; if the first 24 are hit, shooter chooses H or L on Station 7.
        window.DISCIPLINE = {
            id: 'skeet',
            name: 'English Skeet',
            code: 'ESK',
            storageKey: 'clayscorer_esk',
            standLabel: 'Station',
            maxShooters: 10,
            showFirstUpRotation: false,
            enableStandDescriptions: false,
            editable: { standCount: false, targetsPerStand: false, extraClay: false },
            optionTarget: {
                label: 'OPT',
                fallbackStandId: 7,
                migrateFromStandId: 7,
                migrateFromIndex: 4
            },
            fixedStands: [
                { id: 1, targets: 4, labels: ['H', 'L', 'H+L', 'H+L'] },
                { id: 2, targets: 4, labels: ['H', 'L', 'H+L', 'H+L'] },
                { id: 3, targets: 2, labels: ['H', 'L'] },
                { id: 4, targets: 4, labels: ['H', 'L', 'H/L', 'H/L'] },
                { id: 5, targets: 2, labels: ['H', 'L'] },
                { id: 6, targets: 4, labels: ['H', 'L', 'L+H', 'L+H'] },
                { id: 7, targets: 4, labels: ['L', 'H', 'L+H', 'L+H'] }
            ]
        };
    </script>
    <script src="assets/scorer.js"></script>
    <script src="assets/firebase-sync-loader.js"></script>
</body>
</html>
